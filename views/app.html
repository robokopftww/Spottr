<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spottr | Gym Buddy Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero hero-row">
        <div>
          <p class="pill">Spottr</p>
          <h1>Find your next gym buddy.</h1>
          <p class="sub">
            Your account is your profile, so every post and join happens under your saved Spottr identity.
          </p>
        </div>
        <div class="hero-actions">
          <button id="refresh-btn" class="ghost" type="button">Refresh</button>
          <button id="logout-btn" class="ghost" type="button">Log out</button>
        </div>
      </section>

      <section class="grid">
        <article class="card accent-card">
          <p class="eyebrow">Your profile</p>
          <h2 id="profile-name">Loading...</h2>
          <p id="profile-username" class="muted"></p>
          <p id="profile-summary" class="active-profile-summary"></p>
          <p id="profile-details" class="profile-tags"></p>
        </article>

        <article class="card">
          <div class="header-row">
            <div>
              <p class="eyebrow">Post a lift</p>
              <h2>Create a session</h2>
            </div>
          </div>
          <p id="session-profile-hint" class="muted">Posting with your saved Spottr account.</p>
          <form id="create-form" class="form">
            <label>
              Lift type
              <select required name="workoutType">
                <option value="">Select a workout</option>
                <option>Leg Day</option>
                <option>Chest Day</option>
                <option>Back Day</option>
                <option>Push</option>
                <option>Pull</option>
                <option>Cardio</option>
                <option>Full Body</option>
              </select>
            </label>

            <label>
              Start time
              <input required type="datetime-local" name="startTimeLocal" />
            </label>

            <label>
              Max group size (including you)
              <input required type="number" min="2" max="8" value="2" name="capacity" />
            </label>

            <label>
              Notes
              <textarea name="notes" rows="3" maxlength="250" placeholder="Heavy squats and lunges"></textarea>
            </label>

            <button type="submit">Post session</button>
          </form>
          <p id="create-message" class="message"></p>
        </article>
      </section>

      <section class="grid grid-wide">
        <article class="card">
          <div class="header-row">
            <div>
              <p class="eyebrow">Find a crew</p>
              <h2>Open sessions</h2>
            </div>
          </div>

          <div id="sessions" class="sessions">
            <p class="muted">No sessions yet. Be the first to post one.</p>
          </div>
          <p id="sessions-message" class="message"></p>
        </article>
      </section>
    </main>

    <template id="session-template">
      <article class="session">
        <div class="session-head">
          <h3 class="workout"></h3>
          <p class="time"></p>
        </div>
        <p class="meta"></p>
        <p class="host-details"></p>
        <p class="notes"></p>
        <p class="joined"></p>
        <p class="join-context"></p>
        <button class="join-btn" type="button">Join session</button>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
